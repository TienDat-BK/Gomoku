<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomoku AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .cell {
        width: 30px;
        height: 30px;
        border: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background-color: #f0d9b5; /* Wooden color */
      }
      .cell:hover {
        background-color: #e0c9a5;
      }
      .stone {
        width: 24px;
        height: 24px;
        border-radius: 50%;
      }
      .black {
        background-color: black;
        box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.3);
      }
      .white {
        background-color: white;
        box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.3);
      }
      .last-move::after {
        content: "";
        display: block;
        width: 8px;
        height: 8px;
        background-color: red;
        border-radius: 50%;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">
    <h1 class="text-4xl font-bold mb-4 text-gray-800">Gomoku vs AI</h1>

    <div class="mb-4 space-x-4">
      <button
        id="resetBtn"
        class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 font-bold shadow transition"
      >
        New Game
      </button>
      <span id="status" class="text-xl font-semibold text-gray-700"
        >Your Turn (Black)</span
      >
    </div>

    <div
      id="board"
      class="grid grid-cols-15 gap-0 border-4 border-amber-800 shadow-2xl"
    >
      <!-- Cells generated by JS -->
    </div>

    <script>
      const BOARD_SIZE = 15;
      let board = Array(BOARD_SIZE)
        .fill()
        .map(() => Array(BOARD_SIZE).fill(0));
      let isGameOver = false;
      let isPlayerTurn = true; // Player is Black (1)

      const boardEl = document.getElementById("board");
      const statusEl = document.getElementById("status");
      const resetBtn = document.getElementById("resetBtn");

      // Render Board
      boardEl.style.gridTemplateColumns = `repeat(${BOARD_SIZE}, 30px)`;

      function renderBoard() {
        boardEl.innerHTML = "";
        for (let r = 0; r < BOARD_SIZE; r++) {
          for (let c = 0; c < BOARD_SIZE; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.r = r;
            cell.dataset.c = c;

            if (board[r][c] === 1) {
              const stone = document.createElement("div");
              stone.className = "stone black";
              cell.appendChild(stone);
            } else if (board[r][c] === 2) {
              // AI is 2
              const stone = document.createElement("div");
              stone.className = "stone white";
              cell.appendChild(stone);
            }

            cell.onclick = () => handleMove(r, c);
            boardEl.appendChild(cell);
          }
        }
      }

      async function handleMove(r, c) {
        if (isGameOver || !isPlayerTurn || board[r][c] !== 0) return;

        // Player Move
        board[r][c] = 1;
        renderBoard();

        if (checkWin(r, c, 1)) {
          statusEl.innerText = "You Win!";
          isGameOver = true;
          return;
        }

        isPlayerTurn = false;
        statusEl.innerText = "AI is thinking...";

        // Call API
        try {
          const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ board: board }),
          });

          if (!response.ok) throw new Error("API Error");

          const data = await response.json();
          const aiR = data.x;
          const aiC = data.y;

          if (board[aiR][aiC] !== 0) {
            alert("AI attempted invalid move!");
            return;
          }

          board[aiR][aiC] = 2; // AI is 2 (White)
          renderBoard();

          if (checkWin(aiR, aiC, 2)) {
            statusEl.innerText = "AI Wins!";
            isGameOver = true;
          } else {
            isPlayerTurn = true;
            statusEl.innerText = "Your Turn (Black)";
          }
        } catch (err) {
          console.error(err);
          statusEl.innerText = "Error contacting AI";
        }
      }

      function checkWin(r, c, player) {
        const directions = [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ];
        for (let [dr, dc] of directions) {
          let count = 1;
          // Check forward
          for (let i = 1; i < 5; i++) {
            if (
              isValid(r + i * dr, c + i * dc) &&
              board[r + i * dr][c + i * dc] === player
            )
              count++;
            else break;
          }
          // Check backward
          for (let i = 1; i < 5; i++) {
            if (
              isValid(r - i * dr, c - i * dc) &&
              board[r - i * dr][c - i * dc] === player
            )
              count++;
            else break;
          }
          if (count >= 5) return true;
        }
        return false;
      }

      function isValid(r, c) {
        return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE;
      }

      resetBtn.onclick = () => {
        board = Array(BOARD_SIZE)
          .fill()
          .map(() => Array(BOARD_SIZE).fill(0));
        isGameOver = false;
        isPlayerTurn = true;
        statusEl.innerText = "Your Turn (Black)";
        renderBoard();
      };

      renderBoard();
    </script>
  </body>
</html>
